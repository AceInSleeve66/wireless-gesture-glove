; Wireless Gesture Glove — component experiments
;
; This is a SEPARATE PlatformIO project from the product firmware in the
; repository root. Each environment builds one standalone bench-test sketch.
; src_dir is set to this folder so the sketches can live in <test>/<board>/.

[platformio]
src_dir = .

[env]
framework = arduino
monitor_speed = 115200

[env:connection_esp32]
platform = espressif32
board = esp32dev
build_src_filter = -<*> +<connection/esp32/>
lib_deps = nrf24/RF24

[env:connection_leonardo]
platform = atmelavr
board = leonardo
build_src_filter = -<*> +<connection/leonardo/>
lib_deps = nrf24/RF24

[env:rf_esp32]
platform = espressif32
board = esp32dev
build_src_filter = -<*> +<rf/esp32/>
lib_deps = nrf24/RF24

[env:rf_leonardo]
platform = atmelavr
board = leonardo
build_src_filter = -<*> +<rf/leonardo/>
lib_deps = nrf24/RF24

[env:imu_esp32]
platform = espressif32
board = esp32dev
build_src_filter = -<*> +<imu/esp32/>
lib_deps =
    adafruit/Adafruit BNO055
    adafruit/Adafruit Unified Sensor

[env:touch_esp32]
platform = espressif32
board = esp32dev
build_src_filter = -<*> +<touch/esp32/>
