name: build

# Compile both PlatformIO projects on every push to main and every pull
# request, so main always builds.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    name: Compile firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('**/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build product firmware (glove + dongle)
        run: pio run

      - name: Build component experiments
        run: pio run -d experiments
