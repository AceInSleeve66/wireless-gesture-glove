; Wireless Gesture Glove - product firmware
;
; This is the PRODUCT PlatformIO project. It builds the two firmwares that
; make up the glove system. Bench-test sketches live in the separate
; experiments/ project (experiments/platformio.ini).

[platformio]
default_envs = glove, dongle

[env]
framework = arduino
monitor_speed = 115200

[env:glove]
platform = espressif32
board = esp32dev
build_src_filter = -<*> +<glove/>
lib_deps =
    adafruit/Adafruit BNO055
    adafruit/Adafruit Unified Sensor
    nrf24/RF24

[env:dongle]
platform = atmelavr
board = leonardo
build_src_filter = -<*> +<dongle/>
lib_deps = nrf24/RF24
